name: docker_deploy
title: Docker 部署脚本
description: 生成 docker run 命令与 docker-compose.yml 部署文件
icon: 🐳
category: deploy

questions:
  - name: image
    label: 镜像名称
    type: string
    default: nginx:latest
    required: true
    help: 例如 myapp:1.0.0 或 nginx:latest

  - name: container_name
    label: 容器名称
    type: string
    default: my-app
    required: true

  - name: host_port
    label: 主机端口
    type: int
    default: 8080
    min: 1
    max: 65535
    required: true

  - name: container_port
    label: 容器端口
    type: int
    default: 80
    min: 1
    max: 65535
    required: true

  - name: env_vars
    label: 环境变量
    type: string
    default: "NODE_ENV=production,APP_PORT=80"
    help: 逗号分隔的 KEY=VALUE 对

  - name: volumes
    label: 数据卷映射
    type: string
    default: "/data/app:/app/data"
    help: 逗号分隔的 host:container 路径

  - name: auto_restart
    label: 自动重启
    type: bool
    default: true

  - name: network
    label: 网络模式
    type: choice
    choices:
      - bridge
      - host
      - none
    default: bridge

computed:
  restart_policy: "'unless-stopped' if auto_restart else 'no'"
  env_list: "[item.strip() for item in env_vars.split(',') if item.strip()]"
  volume_list: "[item.strip() for item in volumes.split(',') if item.strip()]"

script: |
  #!/bin/bash
  # Docker 部署脚本 - {{ container_name }}
  set -euo pipefail

  IMAGE="{{ image }}"
  CONTAINER="{{ container_name }}"
  HOST_PORT={{ host_port }}
  CONTAINER_PORT={{ container_port }}
  NETWORK="{{ network }}"
  RESTART="{{ restart_policy }}"

  echo "==> 停止并移除旧容器（如存在）..."
  docker stop "$CONTAINER" 2>/dev/null || true
  docker rm "$CONTAINER" 2>/dev/null || true

  echo "==> 拉取镜像 $IMAGE..."
  docker pull "$IMAGE"

  echo "==> 启动容器..."
  docker run -d \
    --name "$CONTAINER" \
    --restart "$RESTART" \
    --network "$NETWORK" \
    -p "${HOST_PORT}:${CONTAINER_PORT}" \
  {% for env in env_list %}
    -e "{{ env }}" \
  {% endfor %}
  {% for vol in volume_list %}
    -v "{{ vol }}" \
  {% endfor %}
    "$IMAGE"

  echo "==> 容器状态:"
  docker ps --filter "name=$CONTAINER"

  echo "==> 访问地址: http://localhost:${HOST_PORT}"
  echo "==> 查看日志: docker logs -f $CONTAINER"

extra_outputs:
  - name: docker-compose.yml
    content: |
      version: '3.8'

      services:
        {{ container_name }}:
          image: {{ image }}
          container_name: {{ container_name }}
          restart: {{ restart_policy }}
          network_mode: {{ network }}
          ports:
            - "{{ host_port }}:{{ container_port }}"
      {% if env_list %}
          environment:
      {% for env in env_list %}
      {% set parts = env.split('=', 1) %}
            - {{ parts[0] }}={{ parts[1] if parts|length > 1 else '' }}
      {% endfor %}
      {% endif %}
      {% if volume_list %}
          volumes:
      {% for vol in volume_list %}
            - {{ vol }}
      {% endfor %}
      {% endif %}

  - name: Dockerfile
    content: |
      # 基于 {{ image }} 的 Dockerfile 示例
      FROM {{ image }}

      {% for env in env_list %}
      {% set parts = env.split('=', 1) %}
      ENV {{ parts[0] }}={{ parts[1] if parts|length > 1 else '' }}
      {% endfor %}

      EXPOSE {{ container_port }}

      {% if auto_restart %}
      # 配合 docker-compose restart: {{ restart_policy }}
      {% endif %}

      CMD []

primary_output: script
