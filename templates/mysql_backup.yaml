name: mysql_backup
title: MySQL 备份脚本
description: mysqldump 全量备份脚本，支持 gzip 压缩与 crontab 定时任务
icon: 🗄️
category: backup

questions:
  - name: db_user
    label: 数据库用户名
    type: string
    default: root
    required: true

  - name: db_password
    label: 数据库密码
    type: string
    default: ""
    required: true
    help: 建议使用 .my.cnf 文件存储密码

  - name: db_host
    label: 数据库主机
    type: string
    default: localhost
    required: true

  - name: databases
    label: 备份数据库
    type: string
    default: "--all-databases"
    required: true
    help: 输入 --all-databases 或逗号分隔的数据库名

  - name: backup_dir
    label: 备份目录
    type: string
    default: /backup/mysql
    required: true

  - name: retention_days
    label: 保留天数
    type: int
    default: 7
    min: 1
    max: 90
    required: true

  - name: compress
    label: gzip 压缩
    type: bool
    default: true

  - name: add_crontab
    label: 添加 Crontab 任务
    type: bool
    default: true
    help: 每天凌晨 2 点自动执行备份

  - name: cron_hour
    label: 定时执行小时
    type: int
    default: 2
    min: 0
    max: 23
    show_when:
      add_crontab: true

computed:
  backup_filename: "'all_databases' if databases.strip() == '--all-databases' else databases.replace(',', '_').replace(' ', '')"
  file_ext: "'sql.gz' if compress else 'sql'"

script: |
  #!/bin/bash
  # MySQL 备份脚本
  # 备份目录: {{ backup_dir }} | 保留 {{ retention_days }} 天
  set -euo pipefail

  DB_USER="{{ db_user }}"
  DB_PASS="{{ db_password }}"
  DB_HOST="{{ db_host }}"
  DATABASES="{{ databases }}"
  BACKUP_DIR="{{ backup_dir }}"
  RETENTION={{ retention_days }}
  COMPRESS={% if compress %}true{% else %}false{% endif %}
  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
  BACKUP_NAME="mysql_{{ backup_filename }}_${TIMESTAMP}"
  LOG_FILE="${BACKUP_DIR}/backup.log"

  mkdir -p "$BACKUP_DIR"

  log() {
      echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*" | tee -a "$LOG_FILE"
  }

  log "===== MySQL 备份开始 ====="

  if [ "$DATABASES" = "--all-databases" ]; then
      DUMP_CMD="mysqldump -h'$DB_HOST' -u'$DB_USER' -p'$DB_PASS' --all-databases --single-transaction --routines --triggers"
  else
      IFS=',' read -ra DB_LIST <<< "$DATABASES"
      DB_ARGS=""
      for db in "${DB_LIST[@]}"; do
          db=$(echo "$db" | xargs)
          DB_ARGS="$DB_ARGS '$db'"
      done
      DUMP_CMD="mysqldump -h'$DB_HOST' -u'$DB_USER' -p'$DB_PASS' --single-transaction --routines --triggers $DB_ARGS"
  fi

  if [ "$COMPRESS" = "true" ]; then
      BACKUP_FILE="${BACKUP_DIR}/${BACKUP_NAME}.sql.gz"
      log "备份到: $BACKUP_FILE"
      eval "$DUMP_CMD" | gzip > "$BACKUP_FILE"
  else
      BACKUP_FILE="${BACKUP_DIR}/${BACKUP_NAME}.sql"
      log "备份到: $BACKUP_FILE"
      eval "$DUMP_CMD" > "$BACKUP_FILE"
  fi

  BACKUP_SIZE=$(du -h "$BACKUP_FILE" | cut -f1)
  log "备份完成，大小: $BACKUP_SIZE"

  log "清理 ${RETENTION} 天前的备份..."
  find "$BACKUP_DIR" -name "mysql_*.sql*" -mtime +${RETENTION} -delete
  log "剩余备份: $(find "$BACKUP_DIR" -name 'mysql_*.sql*' | wc -l) 个"

  log "===== 备份完成 ====="

  {% if add_crontab %}
  CRON_LINE="{{ cron_hour }} 0 * * * $(realpath "$0") >> ${BACKUP_DIR}/cron.log 2>&1"
  (crontab -l 2>/dev/null | grep -v "mysql_backup"; echo "$CRON_LINE") | crontab -
  log "Crontab 已添加: 每天 {{ cron_hour }}:00 执行"
  {% endif %}

extra_outputs:
  - name: crontab_entry.txt
    content: |
      # MySQL 备份 Crontab 条目
      # 每天 {{ cron_hour }}:00 执行
      {{ cron_hour }} 0 * * * /path/to/mysql_backup.sh >> {{ backup_dir }}/cron.log 2>&1
