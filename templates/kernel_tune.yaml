name: kernel_tune
title: 内核参数优化
description: 优化 Linux 内核网络与文件描述符参数
icon: ⚡
category: deploy

questions:
  - name: profile
    label: 优化场景
    type: choice
    choices: [web_server, database, general]
    default: web_server
  - name: max_connections
    label: 最大连接数
    type: int
    default: 65535
    min: 1024
    max: 1048576
  - name: file_max
    label: 文件描述符上限
    type: int
    default: 2097152
    min: 65536
    max: 10485760
  - name: swappiness
    label: Swappiness
    type: int
    default: 10
    min: 0
    max: 100
  - name: apply_now
    label: 立即生效
    type: bool
    default: true

script: |
  #!/bin/bash
  set -euo pipefail
  cat > /etc/sysctl.d/99-opsgen-tune.conf <<'SYSCTL_EOF'
  # OpsGen 内核优化 - {{ profile }}
  fs.file-max = {{ file_max }}
  net.core.somaxconn = {{ max_connections }}
  net.core.netdev_max_backlog = 65535
  net.ipv4.tcp_max_syn_backlog = {{ max_connections }}
  net.ipv4.ip_local_port_range = 1024 65535
  net.ipv4.tcp_tw_reuse = 1
  net.ipv4.tcp_fin_timeout = 15
  net.ipv4.tcp_keepalive_time = 600
  vm.swappiness = {{ swappiness }}
  {% if profile == 'web_server' %}
  net.ipv4.tcp_fastopen = 3
  {% elif profile == 'database' %}
  vm.dirty_ratio = 15
  vm.dirty_background_ratio = 5
  {% endif %}
  SYSCTL_EOF
  {% if apply_now %}
  sysctl -p /etc/sysctl.d/99-opsgen-tune.conf
  {% endif %}
  cat >> /etc/security/limits.d/opsgen.conf <<'LIMITS_EOF'
  * soft nofile {{ file_max }}
  * hard nofile {{ file_max }}
  LIMITS_EOF
  echo "==> 内核参数已配置 (profile: {{ profile }})"

extra_outputs:
  - name: sysctl.conf.snippet
    content: |
      fs.file-max = {{ file_max }}
      net.core.somaxconn = {{ max_connections }}
      vm.swappiness = {{ swappiness }}
