name: pm2_nodejs
title: PM2 Node.js 部署
description: 使用 PM2 部署 Node.js 应用，支持集群模式
icon: 🟢
category: deploy

questions:
  - name: app_name
    label: 应用名称
    type: string
    default: my-api
    required: true
  - name: app_dir
    label: 应用目录
    type: string
    default: /opt/my-api
    required: true
  - name: entry_file
    label: 入口文件
    type: string
    default: index.js
  - name: instances
    label: 实例数
    type: int
    default: 2
    min: 1
    max: 32
  - name: port
    label: 端口
    type: int
    default: 3000
    min: 1
    max: 65535
  - name: node_version
    label: Node 版本
    type: choice
    choices: ["18", "20", "22"]
    default: "20"
  - name: env_vars
    label: 环境变量
    type: string
    default: "NODE_ENV=production,PORT=3000"

computed:
  env_list: "[item.strip() for item in env_vars.split(',') if item.strip()]"

script: |
  #!/bin/bash
  set -euo pipefail
  curl -fsSL https://deb.nodesource.com/setup_{{ node_version }}.x | bash -
  apt-get install -y nodejs
  npm install -g pm2
  cd {{ app_dir }}
  [ -f package.json ] && npm ci --production || true
  pm2 delete {{ app_name }} 2>/dev/null || true
  {% for env in env_list %}
  {% set parts = env.split('=', 1) %}
  export {{ parts[0] }}="{{ parts[1] if parts|length > 1 else '' }}"
  {% endfor %}
  pm2 start {{ entry_file }} --name {{ app_name }} -i {{ instances }}
  pm2 save
  pm2 startup systemd -u root --hp /root
  pm2 status
  echo "==> {{ app_name }} 已部署，端口 {{ port }}"

extra_outputs:
  - name: ecosystem.config.js
    content: |
      module.exports = {
        apps: [{
          name: '{{ app_name }}',
          script: '{{ entry_file }}',
          cwd: '{{ app_dir }}',
          instances: {{ instances }},
          exec_mode: 'cluster',
          env: {
      {% for env in env_list %}
      {% set parts = env.split('=', 1) %}
            {{ parts[0] }}: '{{ parts[1] if parts|length > 1 else '' }}',
      {% endfor %}
          },
        }],
      };
