replicaCount: 1

image:
  repository: ccr.ccs.tencentyun.com/gxjluck/opsgen
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

persistence:
  enabled: true
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

env:
  - name: FLASK_DEBUG
    value: "false"
  - name: FLASK_ENV
    value: "production"
  - name: PORT
    value: "5000"
    # 请在生产环境中使用安全的密钥: python -c "import uuid; print(uuid.uuid4().hex)"
  - name: SECRET_KEY
    value: "98834ab2638e4cec8a0019bfb67c19df"

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}